version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devops_toolbelt_api
    ports:
      - "8080:8080"
    environment:
      - JENKINS_URL=http://jenkins:8080
    depends_on:
      - jenkins
    restart: unless-stopped

  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins_server
    ports:
      - "9090:8080"       # ภายนอก -> ภายใน Jenkins
      - "50000:50000"     # สำหรับเชื่อม Jenkins agent ถ้ามี
    volumes:
      - jenkins_home:/var/jenkins_home
    restart: unless-stopped


  db:
    image: postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Aa123456
      POSTGRES_DB: bo
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data:
  jenkins_home: